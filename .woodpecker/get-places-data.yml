when:
  - event: push
    branch: main
    path:
      - services/get-places-data/**
      - .woodpecker/get-places-data.yml
  - event: manual
    branch: main

steps:
  - name: build-and-push
    image: woodpeckerci/plugin-docker-buildx
    settings:
      platforms: linux/amd64
      registry: ghcr.io
      repo: ghcr.io/pvt-vt-2026/stockholmbar-get-places-data
      tags:
        - latest
        - "${CI_COMMIT_SHA:0:8}"
      username:
        from_secret: GHCR_USERNAME
      password:
        from_secret: GHCR_TOKEN
      dockerfile: services/get-places-data/Dockerfile
      context: services/get-places-data

  - name: deploy
    image: appleboy/drone-ssh
    settings:
      host:
        from_secret: HETZNER_IP
      username: deploy
      key:
        from_secret: HETZNER_SSH_KEY
      script:
        - cd ~/app
        - docker compose pull get-places-data
        - docker compose up -d --no-deps get-places-data
